<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AIE Command Center</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0a0f1e;color:#f3f4f6;padding:20px;font-size:13px}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid #1f2937}
.hdr h1{color:#4f8ef7;font-size:1rem;letter-spacing:1px;text-transform:uppercase}
.hdr .sub{font-size:.7rem;color:#6b7280;margin-top:2px}
.btn{background:#1f2937;border:1px solid #374151;color:#9ca3af;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.75rem}
.btn:hover{background:#374151;color:#f3f4f6}
.grid{display:grid;gap:14px;margin-bottom:14px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.card{background:#111827;border:1px solid #1f2937;border-radius:8px;padding:14px}
.card h2{font-size:.7rem;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.stat{font-size:1.6rem;font-weight:700}
.stat-g{color:#22c55e}.stat-r{color:#ef4444}.stat-o{color:#f59e0b}.stat-b{color:#4f8ef7}.stat-p{color:#a855f7}
.sub-stat{font-size:.75rem;color:#6b7280;margin-top:4px}
.bar-bg{background:#1f2937;border-radius:4px;height:6px;margin:8px 0}
.bar-fill{height:6px;border-radius:4px;background:#22c55e}
table{width:100%;border-collapse:collapse}
th{text-align:left;color:#6b7280;padding:5px 6px;border-bottom:1px solid #1f2937;font-size:.7rem;text-transform:uppercase}
td{padding:5px 6px;border-bottom:1px solid #0a0f1e;font-size:.78rem}
tr:last-child td{border-bottom:none}
.chip{display:inline-block;padding:1px 7px;border-radius:10px;font-size:.65rem;font-weight:600}
.cg{background:rgba(34,197,94,.12);color:#22c55e}
.cr{background:rgba(239,68,68,.12);color:#ef4444}
.co{background:rgba(245,158,11,.12);color:#f59e0b}
.cb{background:rgba(79,142,247,.12);color:#4f8ef7}
.loader{color:#6b7280;text-align:center;padding:30px}
.err{color:#ef4444;font-size:.8rem;padding:10px}
.ts{text-align:center;color:#374151;font-size:.7rem;margin-top:14px}
</style>
</head>
<body>
<div class="hdr">
  <div><h1>&#9873; Entropik AIE Command Center</h1><div class="sub" id="ts">Loading...</div></div>
  <button class="btn" onclick="load()">&#8635; Refresh</button>
</div>
<div id="app"><div class="loader">Fetching live data from Supabase...</div></div>
<script>
const SB="https://trjvmhgugbobamoyqyck.supabase.co";
const AK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRyanZtaGd1Z2JvYmFtb3lxeWNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NjgzMDYsImV4cCI6MjA5MTE0NDMwNn0.Ua50BkoVPy45xF4mCfZMhNznVFxfFEqFdrIOK6YNwxs";
const H={apikey:AK,Authorization:"Bearer "+AK};
const Q1T=330000,FY27T=3000000;
const REVIVAL=[
  {n:"Expedia Group",a:"$160K",r:"AMER"},
  {n:"Lowe's Companies",a:"$150K",r:"AMER"},
  {n:"Kimberly-Clark",a:"$142.5K",r:"AMER"},
  {n:"theScore",a:"$75K",r:"AMER"},
  {n:"Harvest Insights",a:"$33.75K",r:"AMER"},
  {n:"HawkPartners",a:"$30K",r:"AMER"}
];
async function api(path){
  const c=new AbortController();
  setTimeout(()=>c.abort(),15000);
  const r=await fetch(SB+path,{headers:H,signal:c.signal});
  if(!r.ok)throw new Error(r.status+" "+path);
  return r.json();
}
async function load(){
  document.getElementById("app").innerHTML='<div class="loader">Fetching live data...</div>';
  try{
    const[deals,accs,emails]=await Promise.all([
      api("/rest/v1/deals?select=deal_name,stage,amount,arr,region,closing_date,ae_owner&stage=neq.Closed+Lost&limit=300"),
      api("/rest/v1/accounts?select=account_name,status,region&limit=1000"),
      api("/rest/v1/email_intel_log?select=subject,signal_type,account_name,created_at&order=created_at.desc&limit=10")
    ]);
    const open=Array.isArray(deals)?deals.filter(x=>x.stage!=="Closed Won"):[];
    const won=Array.isArray(deals)?deals.filter(x=>x.stage==="Closed Won"):[];
    const all=Array.isArray(accs)?accs:[];
    const sig=Array.isArray(emails)?emails:[];
    const wonArr=won.reduce((s,x)=>s+(parseFloat(x.arr)||parseFloat(x.amount)||0),0);
    const pipeArr=open.reduce((s,x)=>s+(parseFloat(x.arr)||parseFloat(x.amount)||0),0);
    const pct=Math.min(Math.round(wonArr/Q1T*100),100);
    const churn=all.filter(x=>x.status==="Churn Risk");
    const paper=all.filter(x=>x.status==="Paperwork in Progress");
    const exp=all.filter(x=>x.status==="Expansion");
    const top=open.sort((a,b)=>(parseFloat(b.arr||b.amount)||0)-(parseFloat(a.arr||a.amount)||0)).slice(0,12);
    document.getElementById("ts").textContent="Last refreshed: "+new Date().toLocaleString("en-IN");
    document.getElementById("app").innerHTML=`
<div class="grid g4">
  <div class="card"><h2>Q1 FY27 Won</h2><div class="stat stat-g">$${(wonArr/1000).toFixed(0)}K</div><div class="sub-stat">of $${Q1T/1000}K target</div><div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div><div class="sub-stat">${pct}% attained</div></div>
  <div class="card"><h2>Open Pipeline</h2><div class="stat stat-b">$${(pipeArr/1000).toFixed(0)}K</div><div class="sub-stat">${open.length} open deals</div></div>
  <div class="card"><h2>FY27 Annual Target</h2><div class="stat stat-p">$${FY27T/1000000}M</div><div class="sub-stat">Full year goal</div></div>
  <div class="card"><h2>Account Alerts</h2><div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:4px">
    <div><div class="stat stat-r" style="font-size:1.2rem">${churn.length}</div><div class="sub-stat">Churn Risk</div></div>
    <div><div class="stat stat-o" style="font-size:1.2rem">${paper.length}</div><div class="sub-stat">Paperwork</div></div>
    <div><div class="stat stat-g" style="font-size:1.2rem">${exp.length}</div><div class="sub-stat">Expansion</div></div>
  </div></div>
</div>
<div class="grid g2">
  <div class="card"><h2>Open Pipeline — Top Deals</h2>
  <table><tr><th>Deal</th><th>Region</th><th>ARR</th><th>Stage</th></tr>
  ${top.map(x=>`<tr><td>${x.deal_name||"-"}</td><td>${x.region||"-"}</td><td>$${((parseFloat(x.arr||x.amount)||0)/1000).toFixed(0)}K</td><td><span class="chip co">${(x.stage||"-").slice(0,20)}</span></td></tr>`).join("")}
  </table></div>
  <div class="card"><h2>Churn Risk Accounts</h2>
  <table><tr><th>Account</th><th>Region</th></tr>
  ${churn.length?churn.map(x=>`<tr><td>${x.account_name}</td><td>${x.region||"-"}</td></tr>`).join(""):"<tr><td colspan='2' style='color:#6b7280'>None found</td></tr>"}
  </table></div>
</div>
<div class="grid g2">
  <div class="card"><h2>Revival Targets</h2>
  <table><tr><th>Account</th><th>Region</th><th>Lost ARR</th></tr>
  ${REVIVAL.map(x=>`<tr><td>${x.n}</td><td>${x.r}</td><td style="color:#f59e0b">${x.a}</td></tr>`).join("")}
  </table></div>
  <div class="card"><h2>Recent Inbox Signals</h2>
  <table><tr><th>Account</th><th>Type</th><th>Subject</th></tr>
  ${sig.length?sig.map(x=>`<tr><td>${x.account_name||"-"}</td><td><span class="chip cg">${x.signal_type||"-"}</span></td><td>${(x.subject||"").slice(0,35)}</td></tr>`).join(""):"<tr><td colspan='3' style='color:#6b7280'>No recent signals</td></tr>"}
  </table></div>
</div>`;
  }catch(e){
    document.getElementById("app").innerHTML=`<div class="card"><p class="err">Error: ${e.message}. Check console for details.</p></div>`;
    document.getElementById("ts").textContent="Load failed — "+new Date().toLocaleTimeString();
  }
}
load();
</script>
</body>
</html>
