        <style>
                    * {
                                    margin: 0;

                    body {
                                    font-family: 'Inter', sans-serif;
                                    background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);

                    .header {
                                    grid-area: header;

                                    border-radius: 16px;
                                    padding: 24px;
                                    border: 1px solid rgba(255,255,255,0.1);
                                    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
                                    transition: all 0.3s ease;
                    }
                    .section:hover {
                                    transform: translateY(-4px);
                                    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
                    }
                    .section h2 {
                                    font-size: 1.5rem;
                                    font-weight: 600;
                                    margin-bottom: 20px;
                                    color: #ffffff;
                                    display: flex;
                                    align-items: center;
                                    gap: 12px;
                    }
                    .pipeline {
                                    grid-area: pipeline;
                    }
                    .inbox {
                                    grid-area: inbox;
                    }
                    .metrics {
                                    grid-area: metrics;
                                    display: grid;
                                    grid-template-columns: 1fr 1fr;
                                    gap: 20px;
                    }
                    .metric-card {
                                    background: rgba(74,222,128,0.1);
                                    border: 1px solid rgba(74,222,128,0.3);
                                    border-radius: 12px;
                                    padding: 20px;
                                    text-align: center;
                    }
                    .metric-card.churn {
                                    background: rgba(239,68,68,0.1);
                                    border-color: rgba(239,68,68,0.3);
                    }
                    .metric-card.expansion {
                                    background: rgba(59,130,246,0.1);
                                    border-color: rgba(59,130,246,0.3);
                    }
                    .metric-value {
                                    font-size: 2rem;
                                    font-weight: 700;
                                    margin-bottom: 8px;
                    }
                    .churn .metric-value { color: #ef4444; }
                    .expansion .metric-value { color: #3b82f6; }
                    .revival {
                                    grid-area: revival;
                    }
                    .revival-list {
                                    max-height: 400px;
                                    overflow-y: auto;
                    }
                    .revival-item {
                                    display: flex;
                                    justify-content: space-between;
                                    align-items: center;
                                    padding: 16px;
                                    margin-bottom: 12px;
                                    background: rgba(255,255,255,0.05);
                                    border-radius: 12px;
                                    border-left: 4px solid #4ade80;
                                    transition: all 0.2s ease;
                    }
                    .revival-item:hover {
                                    background: rgba(255,255,255,0.1);
                                    transform: translateX(4px);
                    }
                    .revival-name {
                                    font-weight: 600;
                                    color: #ffffff;
                    }
                    .revival-signal {
                                    font-size: 0.9rem;
                                    color: #a0a0a0;
                    }
                    .loading {
                                    text-align: center;
                                    padding: 40px;
                                    color: #888;
                                    font-style: italic;
                    }
                    .error {
                                    background: rgba(239,68,68,0.2);
                                    border: 1px solid #ef4444;
                                    color: #f87171;
                                    padding: 16px;
                                    border-radius: 8px;
                                    margin-top: 20px;
                    }
                    @keyframes pulse {
                                    0%, 100% { opacity: 1; }
                                    50% { opacity: 0.5; }
                    }
                    .pulse {
                                    animation: pulse 2s infinite;
                    }

        <script>
                    const SUPABASE_URL = 'https://trjvmhgugbobamoyqyck.supabase.co';
                    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRyanZtaGd1Z2JvYmFtb3lxeWNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ3OTY1MDQsImV4cCI6MjA2MDM3MjUwNH0.2vM6l6z1R9uD4x5K2vL7pQ8mN3jB0cE5fG6hI7kJ8lM';

                    async function fetchData(endpoint) {
                                    try {
                                                        const response = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}?select=*`, {
                                                                                headers: {
                                                                                                            'apikey': SUPABASE_KEY,
                                                                                                            'Authorization': `Bearer ${SUPABASE_KEY}`
                                                                                    }
                                                        });
                                                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                                                        return await response.json();
                                    } catch (error) {
                                                        console.error('Supabase fetch error:', error);
                                                        return null;
                                    }
                    }

                    async function updateDashboard() {
                                    // Q2 Target (static for now)
                                    document.getElementById('q2-target').textContent = '$1.13M Q2 Target';

                                    // Pipeline
                                    const pipelineData = await fetchData('pipeline_signals');
                                    const pipelineEl = document.getElementById('pipeline-content');
                                    if (pipelineData && pipelineData.length > 0) {
                                                        pipelineEl.innerHTML = `
                                                                            <div style="display: grid; gap: 12px;">
                                                                                                    ${pipelineData.slice(0, 5).map(item => `
                                                                                                                                <div style="padding: 12px; background: rgba(255,255,255,0.05); border-radius: 8px; border-left: 4px solid #4ade80;">
                                                                                                                                                                <div style="font-weight: 600; margin-bottom: 4px;">${item.company || 'Unknown'}</div>
                                                                                                                                                                                                <div style="font-size: 0.9rem; color: #a0a0a0;">${item.signal_type || 'Signal'}</div>
                                                                                                                                                                                                                                <div style="font-size: 0.8rem; color: #60a5fa;">${new Date(item.created_at).toLocaleDateString()}</div>
                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                    `).join('')}
                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                            ${pipelineData.length > 5 ? `<div style="text-align: center; font-size: 0.9rem; color: #a0a0a0; margin-top: 12px;">+${pipelineData.length - 5} more</div>` : ''}
                                                                                                                                                                                                                                                                                                                                            `;
                                    } else {
                                                        pipelineEl.innerHTML = '<div class="error">No pipeline signals found</div>';
                                    }

                                    // Inbox Signals
                                    const inboxData = await fetchData('inbox_intel');
                                    const inboxEl = document.getElementById('inbox-content');
                                    if (inboxData && inboxData.length > 0) {
                                                        inboxEl.innerHTML = `
                                                                            <div style="display: grid; gap: 12px;">
                                                                                                    ${inboxData.slice(0, 5).map(item => `

                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                    `).join('')}
                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                        `;
                                    } else {
                                                        inboxEl.innerHTML = '<div class="error">No inbox intelligence</div>';
                                    }

                                    // Metrics
                                    const churnData = await fetchData('churn_risks');
                                    document.getElementById('churn-count').textContent = churnData ? churnData.length : 0;

                                    const expansionData = await fetchData('expansion_ops');
                                    document.getElementById('expansion-count').textContent = expansionData ? expansionData.length : 0;

                                    // Revival Targets (static top 10)
                                    const revivalTargets = [
                                                        'Expedia Group', 'Lowe\'s', 'Salesforce', 'Adobe', 'Oracle', 'SAP', 'Workday', 'ServiceNow', 'HubSpot', 'Zendesk'
                                                    ];
                                    const revivalEl = document.getElementById('revival-list');

                                                                        <div>
                                                                                                <div class="revival-name">${target}</div>
                                                                                                                        <div class="revival-signal">Priority Revival Target</div>
                                                                                                                                            </div>
                                                                                                                                                                <div style="color: #4ade80; font-weight: 600;">→ Action</div>
                                                                                                                                                                                </div>
                                                                                                                                                                                            `).join('');
                    }

                    // Initial load and refresh every 30s
                    updateDashboard();
                    setInterval(updateDashboard, 30000);

                    // Error boundary
                    window.addEventListener('error', (e) => {
                                    console.error('Dashboard error:', e.error);
                                    document.querySelector('.header').innerHTML += '<div class="error">Data connection issue - retrying...</div>';
                    });
        </script>
